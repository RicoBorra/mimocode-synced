# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "opencode-sync"

[setup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

TARGET_REPO_ROOT="${PWD}"
if git_root="$(git rev-parse --show-toplevel 2>/dev/null)"; then
  TARGET_REPO_ROOT="${git_root}"
fi

SETUP_SCRIPT="${TARGET_REPO_ROOT}/scripts/setup-env.sh"
if [ ! -x "${SETUP_SCRIPT}" ] && [ -f "${SETUP_SCRIPT}" ]; then
  chmod +x "${SETUP_SCRIPT}"
fi

if [ ! -x "${SETUP_SCRIPT}" ]; then
  echo "[env-setup] error: setup script not found at ${SETUP_SCRIPT}" >&2
  exit 127
fi

"${SETUP_SCRIPT}" --repo-root "${TARGET_REPO_ROOT}"
'''

[[actions]]
name = "Check"
icon = "check"
command = "bun run check"

[[actions]]
name = "Test"
icon = "test"
command = "bun test"

[[actions]]
name = "Build"
icon = "build"
command = "bun run build"

[[actions]]
name = "E2E GitHub (2 instances)"
icon = "run"
command = "python3 scripts/e2e/github_two_instance.py"
